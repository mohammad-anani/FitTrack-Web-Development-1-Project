<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--font awesome link-->
    <link rel="stylesheet" href="/fontawesome-free-6.7.2-web/css/all.min.css" />

    <!--CSS files-->
    <link rel="stylesheet" href="/Global/global.css" />
    <link rel="stylesheet" href="/Global/loadingSpinner.css" />
    <link rel="stylesheet" href="/Global/navbar.css" />
    <link rel="stylesheet" href="./styles/cards.css" />
    <link rel="stylesheet" href="../goals/styles/currentGoal.css" />
    <link rel="stylesheet" href="../goals/styles/totalProgress.css" />
    <link rel="stylesheet" href="./styles/style.css" />

    <title>FitTrack Dashboard</title>
  </head>
  <body>
    <!--This aside is present in all pages(acts as a Layout) -->
    <aside>
      <div class="profile-div">
        <img src="../Pictures/logo.png" alt="Logo" class="logo-img" />
        <span class="user-name-span"></span>
      </div>
      <nav>
        <div class="selection-div"></div>
        <a
          class="nav-link dashboard hover-disabled"
          href="/Dashboard"
          data-index="0"
          title="Dashboard"
        >
          <i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a
        >
        <a
          href="/Workouts"
          title="Workouts"
          class="nav-link workouts"
          data-index="1"
        >
          <i class="fa-solid fa-dumbbell"></i>
          <span>Workouts</span>
        </a>
        <a
          href="/Workouts/add"
          title="Log Workout"
          class="nav-link log-workout"
          data-index="2"
        >
          <i class="fa-solid fa-person-running"></i>
          <span>Log Workout</span>
        </a>
        <a
          target="page"
          title="Goals"
          href="/Goals"
          class="nav-link goals"
          data-index="3"
        >
          <i class="fa-solid fa-bullseye"></i><span>Goals</span></a
        >
        <button title="Logout" class="nav-link logout" data-index="4">
          <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
        </button>
      </nav>
    </aside>
    <!--Main Content-->
    <main>
      <div>
        <h3 class="stats">Stats:</h3>
        <div class="cards-div">
          <a class="card one" id="1"
            ><div>
              <h3>Total Workouts:</h3>
              <span id="workouts">1</span>
            </div>
          </a>
          <a class="card two" id="2">
            <div>
              <h3>Total Calories:</h3>
              <span id="calories">10000</span>
            </div></a
          >
          <a class="card three" id="3">
            <div>
              <h3>Total Goals:</h3>
              <span id="goals">1000</span>
            </div></a
          >
        </div>
      </div>

      <div class="currentGoal"></div>
    </main>
  </body>
  <script src="./scripts/scripts.js" type="module"></script>
  <script src="../Global/navbar.js" type="module"></script>
</html>
