<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js" type="module"></script>
    <script src="../Data/init.js" defer type="module"></script>
    <title>Register</title>
  </head>
  <body>
    <h1>Register</h1>
    <form id="form">
      <label for="name">Name:</label>
      <input required name="name" type="text" id="name" />
      <span id="nameValidation">required</span>
      <label for="email">Email:</label>
      <input required name="email" type="email" id="email" />
      <span id="emailValidation">required</span>
      <label for="password">Password:</label>
      <input required name="password" type="password" id="password" />

      <span id="passwordValidation">required</span>
      <button id="submit" type="submit">Submit</button>
      <button id="reset" type="reset">Clear</button>
    </form>
  </body>
</html>
